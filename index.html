<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <form class="formulario">
            <input type="text" class="campo-tarefa" placeholder="Insira sua tarefa" autocomplete="off">
            <div>
                <ul class="lista-tarefas">
                    <li class="checked">gym<i class="fa-solid fa-check-to-slot"></i><i
                            class="fa-solid fa-trash"></i></i></li>
                             <li class="checked">work<i class="fa-solid fa-check-to-slot"></i><i
                            class="fa-solid fa-trash"></i></i></li>
                </ul>
            </div>
        </form>
    </main>
    <script src="index.js"></script>
</body>

</html>
